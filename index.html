<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>tip-calculator-app</title>
  <link rel="stylesheet" href="./src/style.css">
</head>
<body class="bg-grey-200 flex flex-col min-h-screen justify-center items-center pt-10 gap-8 lg:pt-0 lg:gap-16">
  <img src="./public/images/logo.svg" alt="Logo">
  <form id="form" action="#" class="bg-white max-w-110 h-160 font-space p-6 rounded-t-2xl flex flex-col gap-4 sm:max-w-150 md:max-w-160 lg:max-w-210 lg:flex-row lg:h-110 lg:rounded-2xl">
    <div class="flex flex-col gap-4 lg:w-1/2 lg:gap-10 lg:p-4">
    <section class="bill flex flex-col gap-1 lg:gap-2 relative">
      <label for="bill" class="text-gray-500 font-bold">Bill</label>
      <p id="text-bill-zero" class="text-red-500 absolute right-1 hidden">Can't be zero</p>
      <p id="text-bill-negative" class="text-red-500 absolute right-1 hidden">Can't be negative</p>
      <div class="bg-grey-50 flex items-center h-10 rounded-lg p-2 pl-5 outline-none border-transparent hover:border-1 hover:border-green-400 hover:transition hover:duration-500">
        <img src="./public/images/icon-dollar.svg" alt="Dollar icon" class="w-3 h-5">
        <input id="bill" name="bill" type="number" placeholder="0"
          class="bg-grey-50 w-full text-3xl text-right text-green-900 font-space font-bold outline-none  [appearance:textfield] [&::-webkit-outer-spin-button]:appearance-none [&::-webkit-inner-spin-button]:appearance-none">
      </div>
    </section>
    <section class="type flex flex-col gap-2 lg:gap-3">
      <legend class="text-gray-500 font-bold">Select Tip %</legend>
      <div class="flex flex-wrap gap-4 justify-center">
        <label
          class="bg-green-900 text-white text-xl font-bold w-32 h-10 flex justify-center items-center hover:bg-green-400 hover:text-green-900 transition duration-200 rounded-sm has-[:checked]:bg-green-400 has-[:checked]:text-green-900 lg:w-25">
          <input class="hidden" name="tip-type" type="radio" value="0.05">
          5%
        </label>  
        <label
          class="bg-green-900 text-white text-xl font-bold w-32 h-10 flex justify-center items-center
          hover:bg-green-400 hover:text-green-900 transition duration-200 rounded-sm has-[:checked]:bg-green-400 has-[:checked]:text-green-900 lg:w-25">
          <input class="hidden" name="tip-type" type="radio" value="0.1">
          10%
        </label>
        <label
          class="bg-green-900 text-white text-xl font-bold w-32 h-10 flex justify-center items-center hover:bg-green-400 hover:text-green-900 transition duration-200 rounded-sm has-[:checked]:bg-green-400 has-[:checked]:text-green-900 lg:w-25">
          <input class="hidden" name="tip-type" type="radio" value="0.15">
          15%
        </label>
        <label
          class="bg-green-900 text-white text-xl font-bold w-32 h-10 flex justify-center items-center hover:bg-green-400 hover:text-green-900 transition duration-200 rounded-sm has-[:checked]:bg-green-400 has-[:checked]:text-green-900 lg:w-25">
          <input class="hidden" name="tip-type" type="radio" value="0.25">
          25%
        </label>
        <label
          class="bg-green-900 text-white text-xl font-bold w-32 h-10 flex justify-center items-center hover:bg-green-400 hover:text-green-900 transition duration-200 rounded-sm has-[:checked]:bg-green-400 has-[:checked]:text-green-900 lg:w-25">
          <input class="hidden" name="tip-type" type="radio" value="0.50">
          50%
        </label>
        <label
          class="bg-gray-200 text-green-900 text-xl font-bold w-32 h-10 flex justify-center items-center rounded-sm lg:w-25 outline-none border-transparent hover:border-1 hover:border-green-400 hover:transition hover:duration-500">
          
          <input id="custom" placeholder="Custom" class="w-full outline-none text-right pr-8 placeholder:text-green-900 placeholder:text-xl placeholder:font-bold lg:pr-1 lg:text-center [appearance:textfield] [&::-webkit-outer-spin-button]:appearance-none [&::-webkit-inner-spin-button]:appearance-none" name="tip-type" type="number">
        </label>
      </div>
    </section>
     <section  class="people flex flex-col gap-1 lg:gap-2 relative">
      <label  for="people" class="text-gray-500 font-bold">Number of people</label>
      <p id="text-alert" class="text-red-500 absolute right-1 hidden">Can't be zero</p>
      <p id="text-negative" class="text-red-500 text-sm absolute top-1 -right-1 hidden sm:text-base sm:top-0 sm:right-1">Can't be negative</p>
      <div id="number-people" class="bg-grey-50 flex items-center h-10 rounded-lg p-2 pl-5 outline-none">
        <img src="./public/images/icon-person.svg" alt="Person icon" class="w-4 h-4">
        <input id="people" name="people" type="number" min="1" placeholder="0"
          class="bg-grey-50 w-full text-3xl text-right text-green-900 font-space font-bold outline-none [appearance:textfield] [&::-webkit-outer-spin-button]:appearance-none [&::-webkit-inner-spin-button]:appearance-none">
      </div>
    </section>
    </div>
    <section class="results bg-green-900 rounded-lg flex flex-col p-4 pt-6 gap-4 lg:w-1/2 lg:p-10 lg:gap-10">
      <div class="tip__amount flex justify-between items-center">
        <div class="flex flex-col gap-1">
          <p class="text-white h-5">Tip Amount</p>
          <p class="text-gray-400 font-bold text-sm">/ person</p>
        </div>
        <input id="tip" class="text-green-400 w-20 text-2xl font-bold lg:text-5xl lg:w-50 lg:text-right placeholder:text-green-400 " placeholder="$0.00">
      </div>
      <div class="total flex justify-between items-center">
        <div class="flex flex-col gap-1">
          <p class="text-white h-5">Total</p>
          <p class="text-gray-400 font-bold text-sm">/ person</p>
        </div>
        <input id="total" class="text-green-400 w-20 text-2xl font-bold lg:text-5xl lg:w-50 lg:text-right placeholder:text-green-400" placeholder="$0.00">
      </div>
      <button id="reset-button" type="reset" disabled class="bg-green-400 uppercase font-bold text-green-900 h-10 rounded-sm lg:mt-18 disabled:bg-green-800">reset</button>
    </section>
  </form>
  <script type="module" src="/src/main.js"></script>
</body>

</html>
