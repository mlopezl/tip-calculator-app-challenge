<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>tip-calculator-app</title>
  <link rel="stylesheet" href="./src/style.css">
</head>

<body class="bg-grey-200 flex flex-col justify-center items-center pt-15 gap-8">
  <img src="./public/images/logo.svg" alt="Logo">
  <form action="#" class="bg-white w-full h-160 font-space p-6 rounded-t-2xl flex flex-col gap-4">
    <section class="bill flex flex-col gap-1">
      <label for="bill" class="text-gray-500 font-bold">Bill</label>
      <div class="bg-grey-50 flex items-center h-10 rounded-lg p-2 pl-5">
        <img src="./public/images/icon-dollar.svg" alt="Dollar icon" class="w-3 h-5">
        <input id="bill" name="bill" type="number"
          class="bg-grey-50 w-full text-3xl text-right text-green-900 font-space font-bold outline-none">
      </div>
    </section>
    <section class="type flex flex-col gap-2">
      <legend class="text-gray-500 font-bold">Select Tip %</legend>
      <div class="flex flex-wrap gap-4 justify-center">
        <label
          class="bg-green-900 text-white text-xl font-bold w-32 h-10 flex justify-center items-center rounded-sm has-[:checked]:bg-green-400 has-[:checked]:text-green-900">
          <input class="hidden" name="tip-type" type="radio" value="0.05">
          5%
        </label>
        <label
          class="bg-green-900 text-white text-xl font-bold w-32 h-10 flex justify-center items-center rounded-sm has-[:checked]:bg-green-400 has-[:checked]:text-green-900">
          <input class="hidden" name="tip-type" type="radio" value="0.1">
          10%
        </label>
        <label
          class="bg-green-900 text-white text-xl font-bold w-32 h-10 flex justify-center items-center rounded-sm has-[:checked]:bg-green-400 has-[:checked]:text-green-900">
          <input class="hidden" name="tip-type" type="radio" value="0.15">
          15%
        </label>
        <label
          class="bg-green-900 text-white text-xl font-bold w-32 h-10 flex justify-center items-center rounded-sm has-[:checked]:bg-green-400 has-[:checked]:text-green-900">
          <input class="hidden" name="tip-type" type="radio" value="0.25">
          25%
        </label>
        <label
          class="bg-green-900 text-white text-xl font-bold w-32 h-10 flex justify-center items-center rounded-sm has-[:checked]:bg-green-400 has-[:checked]:text-green-900">
          <input class="hidden" name="tip-type" type="radio" value="0.50">
          50%
        </label>
        <label
          class="bg-gray-200 text-green-900 text-xl font-bold w-32 h-10 flex justify-center items-center rounded-sm">
          
          <input id="custom" placeholder="Custom" class="w-full outline-none text-right pr-8 placeholder:text-green-900 placeholder:text-xl placeholder:font-bold" name="tip-type" type="number">
        </label>
      </div>
    </section>
     <section class="people flex flex-col gap-1">
      <label for="people" class="text-gray-500 font-bold">Number of people</label>
      <div class="bg-grey-50 flex items-center h-10 rounded-lg p-2 pl-5">
        <img src="./public/images/icon-person.svg" alt="Dollar icon" class="w-4 h-4">
        <input id="people" name="people" type="number"
          class="bg-grey-50 w-full text-3xl text-right text-green-900 font-space font-bold outline-none">
      </div>
    </section>
    <section class="results bg-green-900 rounded-lg flex flex-col p-4 pt-6 gap-4">
      <div class="tip__amount flex justify-between items-center">
        <div class="flex flex-col gap-1">
          <p class="text-white h-5">Tip Amount</p>
          <p class="text-gray-400 font-bold text-sm">/ person</p>
        </div>
        <input id="tip" class="text-green-400 w-20 text-2xl font-bold" value="$0.00">
      </div>
      <div class="total flex justify-between items-center">
        <div class="flex flex-col gap-1">
          <p class="text-white h-5">Total</p>
          <p class="text-gray-400 font-bold text-sm">/ person</p>
        </div>
        <input id="total" class="text-green-400 w-20 text-2xl font-bold" value="$0.00">
      </div>
      <button type="reset" class="bg-green-400 uppercase font-bold text-green-900 h-10 rounded-sm">reset</button>
    </section>
  </form>
  <script type="module" src="/src/main.js"></script>
</body>

</html>
